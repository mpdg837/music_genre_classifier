name: random_forest

instance:

  _target_: midi_xai.models.classic_model.ClassicModel

  model:
    _target_: sklearn.ensemble.RandomForestClassifier
    n_estimators: 300
    random_state: 42
    n_jobs: -1
    class_weight: balanced

  imputer:
    _target_: sklearn.impute.SimpleImputer
    strategy: median

  scaler: null