name: midi_transformer

dataset:
  kind: note_matrix
  max_notes: 512
  batch_size: 8
  num_workers: 2

training:
  epochs: 20
  learning_rate: 0.0003
  weight_decay: 0.0001
  validation_size: 0.2
  gradient_clip_norm: 1.0

instance:
  _target_: midi_xai.models.neural.transformer.MidiTransformerClassifier
  input_dim: 6
  d_model: 128
  nhead: 4
  num_layers: 4
  dim_feedforward: 256
  dropout: 0.1
  max_len: ${model.dataset.max_notes}
